name: Build and publish

on:
  push:
    branches: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ORG_ADMIN_TOKEN }}

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.3'  # match what is documented in renv.lock

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: LATEST

      - name: Install R dependencies
        run: |
          Rscript -e "install.packages('renv', repos = 'https://packagemanager.posit.co/cran/latest')"
          Rscript -e "renv::restore(repos = 'https://packagemanager.posit.co/cran/latest')"

      - name: Render Quarto Project
        uses: quarto-dev/quarto-actions/render@v2
        with:
          path: website

      - name: Deploy page to Cloudflare using wrangler.toml specs
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Commit built output
        run: |
          git config user.email "ci@rfortherestofus.com"
          git config user.name "CI"
          git add -f website/_site/
          git diff --staged --quiet || git commit -m "build: $(git rev-parse --short HEAD)"
          git push